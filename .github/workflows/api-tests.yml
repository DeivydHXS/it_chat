name: API Tests

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  newman-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install -g newman newman-reporter-htmlextra

      - name: Prepare reports folder
        run: |
          mkdir -p reports
          echo "<html><body><h1>No report generated</h1></body></html>" > reports/report.html

      - name: Run Newman tests
        run: |
          newman run backend/tests/postman/collection.json \
            -e backend/tests/postman/environment.ci.template.json \
            --env-var "baseUrl=${{ secrets.BASE_URL }}" \
            -r cli,htmlextra \
            --reporter-cli-no-summary=false \
            --reporter-cli-no-assertions=false \
            --disable-unicode \
            --reporter-htmlextra-export reports/report.html \
            --reporter-json-export reports/report.json \
            --timeout-request 5000 \
            --timeout 60000

      - name: Create test summary in GitHub Actions
        if: always()
        run: |
          echo "### API Tests Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/report.json ]; then
            TOTAL=$(jq '.run.stats.requests.total' reports/report.json)
            FAILED=$(jq '.run.stats.requests.failed' reports/report.json)
            PASSED=$((TOTAL - FAILED))
            echo "- Total Requests: $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "- Passed: $PASSED" >> $GITHUB_STEP_SUMMARY
            echo "- Failed: $FAILED" >> $GITHUB_STEP_SUMMARY
          else
            echo "No report.json generated." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload HTML report to Actions summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<iframe src='reports/report.html' width='100%' height='600px'></iframe>" >> $GITHUB_STEP_SUMMARY
